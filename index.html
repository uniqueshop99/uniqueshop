<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Games Top Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 2nd Screenshot onujayi Card Design */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 500px; /* Test korar jonno limited kora */
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        /* Image Section - Ekhane apnar upload kora chobi thakbe */
        .product-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        /* Order Now Button - Screenshot-er moto neel */
        .order-btn {
            background-color: #283891;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
            width: 80%;
            transition: 0.3s;
        }

        .order-btn:hover {
            background-color: #1a2563;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="product-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Free Fire UID Topup">
            
            <div class="product-info">
                <div class="product-title">Free Fire UID Topup</div>
                <a href="#" class="order-btn">Order Now</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Unipin Voucher">
            <div class="product-info">
                <div class="product-title">Unipin Voucher</div>
                <a href="#" class="order-btn">Order Now</a>
            </div>
        </div>
    </div>

</body>
</html>
