<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Premium Game Topup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span class="u-logo">U</span>
                <span class="logo-text">nique <span class="shop-text">Shop</span></span>
            </div>
            <div class="auth-buttons">
                <button class="login-btn">Login</button>
                <button class="register-btn">Register</button>
            </div>
        </div>
    </header>

    <!-- Notice -->
    <div class="notice-bar">
        <marquee behavior="scroll" direction="left">Unique Shop-এ স্বাগতম! সবচেয়ে দ্রুত ও নিরাপদ টপ-আপের নিশ্চয়তা। যেকোনো সমস্যায় আমাদের সাথে যোগাযোগ করুন।</marquee>
    </div>

    <!-- Main Content (Topup Grid) -->
    <main class="container">
        <h2 class="section-title">GAMES TOP UP</h2>
        <div class="games-grid">
            
            <!-- 1. Free Fire UID Topup -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/premium-photo/fire-character-from-video-game-standing-front-fire_1022485-6184.jpg');"></div>
                <div class="card-info">
                    <h3>Free Fire UID Topup</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- 2. Unipin Voucher -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/free-vector/gaming-banner-template-with-abstract-shapes_23-2148671158.jpg');"></div>
                <div class="card-info">
                    <h3>Unipin Voucher (BD)</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- 3. Weekly & Monthly -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/premium-photo/pile-shining-blue-diamonds-dark-background-generative-ai_1033240-5232.jpg');"></div>
                <div class="card-info">
                    <h3>Weekly & Monthly</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- 4. Weekly Lite -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/free-photo/shiny-blue-diamonds_1112-921.jpg');"></div>
                <div class="card-info">
                    <h3>Weekly Lite (New)</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- 5. Level Up Pass -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/free-vector/modern-video-game-background-flat-design_23-2148111933.jpg');"></div>
                <div class="card-info">
                    <h3>Level Up Pass</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <h3>STAY CONNECTED</h3>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <p>&copy; 2026 Unique Shop. Developed by MD. MAHBUBUR RAHMAN</p>
        </div>
    </footer>

</body>
</html>
