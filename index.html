<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Games Top Up</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0;
        }

        /* Header Section */
        header {
            background: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #283891;
        }
        .logo span { color: #e91e63; }
        .auth-btns .login {
            border: 1px solid #e91e63;
            color: #e91e63;
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 5px;
        }
        .auth-btns .register {
            background: #e91e63;
            color: white;
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Notice Bar */
        .notice-bar {
            background: #ff8c00;
            color: white;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            font-size: 13px;
            position: relative;
        }

        /* Slider Placeholder */
        .slider {
            background: #111;
            margin: 10px;
            height: 150px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            background: linear-gradient(to right, #00c6ff, #0072ff);
        }

        /* Section Title */
        .section-title {
            text-align: center;
            color: #283891;
            margin: 20px 0;
            font-weight: bold;
            position: relative;
        }
        .section-title::before, .section-title::after {
            content: " ——— ";
            color: #ff4136;
        }

        /* Games Grid - 2 Column */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px;
        }

        /* Game Card Style */
        .game-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .game-card img {
            width: 100%;
            display: block;
            border-bottom: 1px solid #eee;
        }
        .game-info {
            padding: 10px 5px;
        }
        .game-info p {
            margin: 0;
            font-size: 11px;
            color: #333;
            font-weight: bold;
        }

        /* App Download Banner */
        .app-banner {
            background: #fff;
            border: 1px solid #ff007a;
            margin: 15px 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
        }
        .app-banner img { width: 40px; margin-right: 15px; }

        /* Footer */
        footer {
            background: #0a1133;
            color: white;
            padding: 30px 20px;
            margin-top: 20px;
        }
        .footer-title { font-weight: bold; margin-bottom: 15px; display: block; }
        .contact-info { font-size: 12px; color: #ccc; }
    </style>
</head>
