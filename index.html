<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Topup UI</title>
    <style>
        /* সাইটের মূল স্টাইল */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* কার্ড ডিজাইন */
        .card {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* ইমেজের অংশ - আপনার দেওয়া লিঙ্ক এখানে */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #ddd;
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            margin: 0 0 15px;
            color: #333;
            font-size: 1.2rem;
        }

        /* ইনপুট ফিল্ড */
        .input-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        .input-box:focus {
            border-color: #2c3e50;
        }

        /* বাটন ডিজাইন (স্ক্রিনশটের মতো নীল বাটন) */
        .btn-order {
            background-color: #283891;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-order:hover {
            background-color: #1a237e;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- আপনার ডিরেক্ট ইমেজ লিঙ্ক[cite: 1] -->
        <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Free Fire UID Topup">
        
        <div class="card-content">
            <h3>Free Fire UID Topup</h3>
            
            <input type="text" class="input-box" placeholder="Enter Player ID (UID)">
            
            <select class="input-box">
                <option value="">Select Diamond Package</option>
                <option value="115">115 Diamonds - 85 TK</option>
                <option value="240">240 Diamonds - 165 TK</option>
                <option value="610">610 Diamonds - 410 TK</option>
            </select>

            <button class="btn-order">Order Now</button>
        </div>
    </div>

</body>
</html>
