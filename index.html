<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Game Topup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">
                <span class="u-logo">U</span>
                <span class="logo-text">nique <span class="shop-text">Shop</span></span>
            </div>
            <div class="auth-buttons">
                <button class="login-btn">Login</button>
                <button class="register-btn">Register</button>
            </div>
        </div>
    </header>

    <div class="notice-bar">
        <marquee>Unique Shop-এ স্বাগতম! দ্রুত ও নিরাপদ টপ-আপের জন্য আমরাই সেরা।</marquee>
    </div>

    <main class="container">
        <h2 class="section-title">GAMES TOP UP</h2>
        <div class="games-grid">
            
            <!-- UID Topup - Red Theme -->
            <div class="game-card ff-uid">
                <div class="card-icon"><i class="fas fa-user-shield"></i></div>
                <div class="card-info">
                    <h3>Free Fire UID Topup</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- Unipin - Blue Theme -->
            <div class="game-card unipin">
                <div class="card-icon"><i class="fas fa-ticket-alt"></i></div>
                <div class="card-info">
                    <h3>Unipin Voucher</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- Weekly/Monthly - Purple Theme -->
            <div class="game-card weekly">
                <div class="card-icon"><i class="fas fa-gem"></i></div>
                <div class="card-info">
                    <h3>Weekly & Monthly</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- Weekly Lite - Cyan Theme -->
            <div class="game-card lite">
                <div class="card-icon"><i class="fas fa-bolt"></i></div>
                <div class="card-info">
                    <h3>Weekly Lite</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

            <!-- Level Up - Gold Theme -->
            <div class="game-card level-up">
                <div class="card-icon"><i class="fas fa-crown"></i></div>
                <div class="card-info">
                    <h3>Level Up Pass</h3>
                    <button class="buy-btn">Order Now</button>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Unique Shop | Developed by MD. MAHBUBUR RAHMAN</p>
    </footer>

</body>
</html>
