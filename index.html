<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Topup UI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .topup-card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }
        /* Apnar Upload kora Chobi ekhane boseche */
        .topup-card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #ff4136;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
        }
        input:focus {
            border-color: #ff4136;
            box-shadow: 0 0 5px rgba(255, 65, 54, 0.3);
        }
        .btn-topup {
            background: linear-gradient(45deg, #ff4136, #ff851b);
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-topup:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 65, 54, 0.4);
        }
    </style>
</head>
<body>

    <div class="topup-card">
        <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Topup Banner">
        
        <h2 style="margin-top: 0;">UID Top-up</h2>
        
        <div class="input-group">
            <label for="uid">Player UID</label>
            <input type="text" id="uid" placeholder="Enter Player ID">
        </div>

        <div class="input-group">
            <label for="pack">Select Diamond Package</label>
            <input type="text" id="pack" placeholder="e.g. 100 Diamonds">
        </div>

        <button class="btn-topup">Buy Now</button>
        
        <p style="font-size: 11px; color: #555; margin-top: 15px;">Secure API Automation Enabled</p>
    </div>

</body>
</html>
