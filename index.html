<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Free Fire Topup</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="navbar">
            <div class="logo">
                <span class="u-logo">U</span>
                <span class="logo-text">nique <span class="shop-text">Shop</span></span>
            </div>
            <div class="auth-buttons">
                <button class="login-btn">Login</button>
                <button class="register-btn">Register</button>
            </div>
        </div>
    </header>

    <!-- Notice Section -->
    <div class="notice-bar">
        <p><strong>Notice:</strong> Unique Shop-এ আপনাকে স্বাগতম! যেকোনো সমস্যায় আমাদের হোয়াটসঅ্যাপে মেসেজ দিন।</p>
    </div>

    <!-- Main Content (Games Grid) -->
    <main class="container">
        <h2 class="section-title">GAMES TOP UP</h2>
        <div class="games-grid">
            <!-- Item 1 -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/premium-photo/fire-letter-v-design-background_1022485-11005.jpg');"></div>
                <p>Free Fire UID Topup</p>
            </div>
            <!-- Item 2 -->
            <div class="game-card">
                <div class="card-img" style="background-image: url('https://img.freepik.com/premium-photo/gold-diamond-blue-background_935408-542.jpg');"></div>
                <p>Weekly & Monthly Offer</p>
            </div>
            <!-- এভাবে আপনি আরও কার্ড যোগ করতে পারেন -->
        </div>
    </main>

    <!-- Footer Section -->
    <footer>
        <div class="footer-content">
            <h3>STAY CONNECTED</h3>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <p>&copy; 2026 Unique Shop. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
