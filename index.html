<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Shop - Games Top Up</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 0;
        }

        /* Header Section */
        header {
            background: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #283891;
        }
        .logo span { color: #e91e63; }
        .auth-btns .login {
            border: 1px solid #e91e63;
            color: #e91e63;
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-right: 5px;
            font-size: 14px;
        }
        .auth-btns .register {
            background: #e91e63;
            color: white;
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Notice Bar */
        .notice-bar {
            background: #ff8c00;
            color: white;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            font-size: 13px;
        }

        /* Promo Slider */
        .slider {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            margin: 10px;
            height: 180px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        /* Games Top Up Title */
        .section-title {
            text-align: center;
            color: #283891;
            margin: 20px 0;
            font-weight: bold;
            font-size: 18px;
        }
        .section-title::before, .section-title::after {
            content: " ——— ";
            color: #ff4136;
        }

        /* Games Grid - 2 per row */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px;
        }

        /* Game Card Style */
        .game-card {
            background: transparent;
            text-align: center;
        }
        .game-card img {
            width: 100%;
            border-radius: 10px;
            display: block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card-name {
            background: #fff;
            margin-top: 8px;
            padding: 8px 5px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
            color: #333;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">U<span>NIQUE</span> SHOP</div>
        <div class="auth-btns">
            <a href="#" class="login">Login</a>
            <a href="#" class="register">Register</a>
        </div>
    </header>

    <div class="notice-bar">
        Notice: Unique Shop-e shagotom! Duto o nirapod top-up er jonno amader shathey thakun...
    </div>

    <div class="slider">
        PROMO BANNER SLIDER
    </div>

    <div class="section-title">GAMES TOP UP</div>

    <div class="games-grid">
        <!-- 1. Free Fire Uid Topup -->
        <div class="game-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Free Fire">
            <div class="card-name">Free Fire Uid Topup</div>
        </div>

        <!-- 2. Unipin -->
        <div class="game-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Unipin">
            <div class="card-name">Unipin</div>
        </div>

        <!-- 3. Weekly Lite -->
        <div class="game-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Weekly Lite">
            <div class="card-name">Weekly Lite</div>
        </div>

        <!-- 4. Weekly & Monthly -->
        <div class="game-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Weekly & Monthly">
            <div class="card-name">Weekly & Monthly</div>
        </div>

        <!-- 5. Level Up Pass -->
        <div class="game-card">
            <img src="https://i.ibb.co.com/k2z9tKwS/image.png" alt="Level Up Pass">
            <div class="card-name">Level Up Pass</div>
        </div>
    </div>

</body>
</html>
